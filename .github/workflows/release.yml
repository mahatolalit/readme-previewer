name: Build and Release

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for creating a GitHub release

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Get version from package.json
        id: version
        run: echo "VERSION=v$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Extract Release Notes from CHANGELOG
        run: |
          RAW_VERSION=$(node -p "require('./package.json').version")
          awk '$1 == "##" && $2 == "['"$RAW_VERSION"']" {flag=1; next} $1 == "##" && $2 ~ /^\[/ {flag=0} flag' CHANGELOG.md > release_notes.md

      - name: Package VS Code Extension (.vsix)
        # vsce packages the extension. -o specifies the output file name.
        run: npx @vscode/vsce package -o readme-previewer-${{ steps.version.outputs.VERSION }}.vsix

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: Release ${{ steps.version.outputs.VERSION }}
          files: readme-previewer-${{ steps.version.outputs.VERSION }}.vsix
          body_path: release_notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
